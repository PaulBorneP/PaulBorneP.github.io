<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Earth Live</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { background: #000; }
    body {
      display: flex;
      align-items: flex-start;
      justify-content: center;
      gap: 4px;
      padding: 4px;
    }
    .earth {
      flex: 1 1 0;
      min-width: 0;
      aspect-ratio: 1 / 1;
      object-fit: contain;
    }
    @media (max-width: 700px) {
      body { flex-direction: column; }
      .earth { width: 100%; aspect-ratio: 1 / 1; }
    }
  </style>
</head>
<body>
  <img class="earth" id="img0" alt="Himawari (NICT)">
  <img class="earth" id="img1" alt="GOES-19 (NOAA)">
  <img class="earth" id="img2" alt="Meteosat (EUMETSAT)">

  <script>
    const STATIC_SOURCES = [
      "https://cdn.star.nesdis.noaa.gov/GOES19/ABI/FD/GEOCOLOR/1808x1808.jpg",
      "https://eumetview.eumetsat.int/static-images/latestImages/EUMETSAT_MSG_RGBNatColourEnhncd_FullResolution.jpg"
    ];
    const INTERVAL_MS = 60 * 60 * 1000; // 1 hour

    function loadHimawari() {
      fetch("https://himawari8.nict.go.jp/img/FULL_24h/latest.json")
        .then(function(r) { return r.json(); })
        .then(function(data) {
          // data.date = "YYYY-MM-DD HH:MM:SS"
          const parts = data.date.replace(" ", "/").replace(/-/g, "/").replace(/:/g, "").split("/");
          // parts = [YYYY, MM, DD, HHMMSS]
          const url = "https://himawari8.nict.go.jp/img/D531106/1d/550/"
            + parts[0] + "/" + parts[1] + "/" + parts[2] + "/"
            + parts[3] + "_0_0.png";
          document.getElementById("img0").src = url;
        });
    }

    function refresh() {
      const t = Date.now();
      loadHimawari();
      STATIC_SOURCES.forEach(function(src, i) {
        document.getElementById("img" + (i + 1)).src = src + "?t=" + t;
      });
    }

    refresh();
    setInterval(refresh, INTERVAL_MS);
  </script>
</body>
</html>
