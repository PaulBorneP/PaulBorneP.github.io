<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Earth Live</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      background: #000;
    }

    body {
      display: flex;
      align-items: flex-start;
      justify-content: center;
      gap: 4px;
      padding: 4px;
    }

    .earth {
      flex: 1 1 0;
      min-width: 0;
      aspect-ratio: 1 / 1;
      object-fit: contain;
    }

    @media (max-width: 700px) {
      body {
        flex-direction: column;
      }

      .earth {
        width: 100%;
        aspect-ratio: 1 / 1;
      }
    }
  </style>
</head>

<body>
  <img class="earth" id="img1" alt="GOES-19 (NOAA)">
  <img class="earth" id="img2" alt="Meteosat (EUMETSAT)">
  <img class="earth" id="img0" alt="Himawari (NICT)">


  <script>
    const STATIC_SOURCES = [
      "https://cdn.star.nesdis.noaa.gov/GOES19/ABI/FD/GEOCOLOR/1808x1808.jpg",
      "https://eumetview.eumetsat.int/static-images/latestImages/EUMETSAT_MSG_RGBNatColourEnhncd_FullResolution.jpg"
    ];
    const INTERVAL_MS = 60 * 60 * 1000; // 1 hour

    function pad(n) { return String(n).padStart(2, "0"); }

    // Build URL from a UTC Date object
    function himawariUrlFromDate(d) {
      const mm = Math.floor(d.getUTCMinutes() / 10) * 10;
      return "https://himawari8.nict.go.jp/img/D531106/1d/550/"
        + d.getUTCFullYear() + "/" + pad(d.getUTCMonth() + 1) + "/" + pad(d.getUTCDate()) + "/"
        + pad(d.getUTCHours()) + pad(mm) + "00_0_0.png";
    }

    // Fallback: compute from local clock with retry
    function loadHimawariByTime(offsetMin, retries) {
      var img = document.getElementById("img0");
      var url = himawariUrlFromDate(new Date(Date.now() - offsetMin * 60 * 1000));
      img.onerror = retries < 6
        ? function () { loadHimawariByTime(offsetMin + 10, retries + 1); }
        : null;
      img.src = url;
    }

    // Primary: read latest.json via CORS proxy to get the exact timestamp
    function loadHimawari() {
      var proxy = "https://corsproxy.io/?url=";
      var target = "https://himawari8.nict.go.jp/img/FULL_24h/latest.json";
      fetch(proxy + encodeURIComponent(target))
        .then(function (r) { return r.json(); })
        .then(function (data) {
          // data.date = "YYYY-MM-DD HH:MM:SS"
          var d = new Date(data.date.replace(" ", "T") + "Z");
          document.getElementById("img0").src = himawariUrlFromDate(d);
        })
        .catch(function () { loadHimawariByTime(20, 0); });
    }

    function refresh() {
      const t = Date.now();
      loadHimawari();
      STATIC_SOURCES.forEach(function (src, i) {
        document.getElementById("img" + (i + 1)).src = src + "?t=" + t;
      });
    }

    refresh();
    setInterval(refresh, INTERVAL_MS);
  </script>
</body>

</html>
